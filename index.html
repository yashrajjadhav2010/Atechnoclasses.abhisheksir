    <script>
      // Fallback for stale service workers
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          console.warn('Boot timeout detected. Attempting emergency recovery...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for(let registration of registrations) {
                registration.unregister();
              }
            });
          }
          if (!window.location.search.includes('retry=true')) {
            window.location.href = window.location.origin + window.location.pathname + '?retry=true';
          }
        }
      }, 5000);
